<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenID Federation — Testscenario's</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Segoe UI', system-ui, sans-serif;
  background: #0d1117;
  color: #e6edf3;
  min-height: 100vh;
  padding: 28px 20px 60px;
}

/* ── Header ── */
.page-header {
  text-align: center;
  margin-bottom: 36px;
}
.page-header h1 {
  font-size: 1.8rem;
  font-weight: 700;
  background: linear-gradient(135deg, #58a6ff, #79c0ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 6px;
}
.page-header .sub {
  color: #8b949e;
  font-size: 0.88rem;
}
.base-url-pill {
  display: inline-block;
  margin-top: 10px;
  padding: 4px 14px;
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 20px;
  font-family: monospace;
  font-size: 0.78rem;
  color: #79c0ff;
}

/* ── Grid ── */
.scenario-grid {
  max-width: 900px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 20px;
}

/* ── Card ── */
.card {
  background: #161b22;
  border: 1px solid #30363d;
  border-radius: 12px;
  overflow: hidden;
}
.card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 14px 20px;
  background: #1c2128;
  border-bottom: 1px solid #30363d;
}
.badge {
  font-size: 0.7rem;
  font-weight: 700;
  padding: 3px 10px;
  border-radius: 20px;
  white-space: nowrap;
  flex-shrink: 0;
}
.badge-ok   { background: #12261e; color: #56d364; border: 1px solid #238636; }
.badge-fail { background: #2d1212; color: #f85149; border: 1px solid #da3633; }
.card-title { font-weight: 600; font-size: 0.98rem; flex: 1; }

.card-body { padding: 18px 20px; display: flex; flex-direction: column; gap: 16px; }
.card-desc { font-size: 0.84rem; color: #8b949e; line-height: 1.6; }

/* ── Chain tree ── */
.chain-section-title {
  font-size: 0.72rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .07em;
  color: #484f58;
  margin-bottom: 2px;
}
.chain-tree {
  display: flex;
  flex-direction: column;
  gap: 0;
}
.tree-node-wrap {
  display: flex;
  flex-direction: column;
  align-items: flex-start;
}
.tree-node {
  border: 1px solid #30363d;
  border-radius: 8px;
  background: #0d1117;
  padding: 12px 16px;
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.tree-node.node-leaf   { border-color: #388bfd55; }
.tree-node.node-inter  { border-color: #d2992255; }
.tree-node.node-anchor { border-color: #3fb95055; }
.tree-node.node-bad    { border-color: #da363355; }

.node-top {
  display: flex;
  align-items: center;
  gap: 10px;
}
.node-icon { font-size: 1.2rem; flex-shrink: 0; }
.node-info { flex: 1; min-width: 0; }
.node-name {
  font-weight: 700;
  font-size: 0.93rem;
}
.node-leaf   .node-name { color: #79c0ff; }
.node-inter  .node-name { color: #e3b341; }
.node-anchor .node-name { color: #56d364; }
.node-bad    .node-name { color: #f85149; }
.node-role {
  font-size: 0.72rem;
  color: #484f58;
  margin-top: 1px;
}
.node-id {
  font-family: monospace;
  font-size: 0.7rem;
  color: #484f58;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 100%;
}

.node-details {
  display: flex;
  flex-wrap: wrap;
  gap: 6px 12px;
  font-size: 0.76rem;
}
.detail-group {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.detail-label {
  color: #484f58;
  font-size: 0.68rem;
  text-transform: uppercase;
  letter-spacing: .05em;
}
.detail-values { display: flex; flex-wrap: wrap; gap: 4px; }
.tag {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.72rem;
  font-family: monospace;
}
.tag-hint-ok    { background: #1f2d17; color: #7ee787; border: 1px solid #238636; }
.tag-hint-fail  { background: #2d1212; color: #f85149; border: 1px solid #da3633; }
.tag-hint-unkn  { background: #1c2128; color: #8b949e; border: 1px solid #30363d; }
.tag-meta-ok    { background: #161b22; color: #8b949e; border: 1px solid #30363d; }
.tag-meta-miss  { background: #2d1f00; color: #e3b341; border: 1px solid #9e6a03; }
.tag-jwks       { background: #0d1f3c; color: #79c0ff; border: 1px solid #388bfd44; }
.tag-err        { background: #2d1212; color: #f85149; border: 1px solid #da3633; }

/* ── Connector / subordinate statement ── */
.tree-connector {
  display: flex;
  flex-direction: column;
  align-items: center;
  width: 100%;
  padding: 2px 0;
  position: relative;
}
.connector-line {
  width: 2px;
  height: 10px;
  background: #30363d;
}
.sub-stmt {
  width: calc(100% - 40px);
  margin: 0 20px;
  background: #1c2128;
  border: 1px solid #30363d;
  border-radius: 6px;
  padding: 10px 14px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  font-size: 0.76rem;
}
.sub-stmt-title {
  font-size: 0.7rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: #484f58;
  margin-bottom: 2px;
}
.sub-stmt-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
}
.check-ok   { color: #56d364; font-weight: 700; }
.check-fail { color: #f85149; font-weight: 700; }
.check-warn { color: #e3b341; font-weight: 700; }

.hint-path-failed {
  width: calc(100% - 40px);
  margin: 0 20px;
  background: #2d1212;
  border: 1px solid #da3633;
  border-radius: 6px;
  padding: 8px 14px;
  font-size: 0.76rem;
  color: #f85149;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* ── Loading placeholder ── */
.chain-placeholder {
  background: #0d1117;
  border: 1px solid #21262d;
  border-radius: 8px;
  padding: 20px;
  text-align: center;
  color: #484f58;
  font-size: 0.83rem;
}
.spinner {
  display: inline-block;
  width: 14px; height: 14px;
  border: 2px solid #30363d;
  border-top-color: #58a6ff;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  vertical-align: middle;
  margin-right: 6px;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── Buttons ── */
.btn-row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
.btn {
  padding: 8px 16px;
  border: none;
  border-radius: 6px;
  font-size: 0.83rem;
  font-weight: 600;
  cursor: pointer;
  transition: background 0.15s;
}
.btn-primary   { background: #238636; color: #fff; }
.btn-primary:hover { background: #2ea043; }
.btn-primary:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
.btn-ghost { background: #21262d; color: #e6edf3; border: 1px solid #30363d; }
.btn-ghost:hover { background: #30363d; }
.btn-ghost:disabled { color: #484f58; cursor: not-allowed; }
.btn-chain { background: #0d2341; color: #79c0ff; border: 1px solid #388bfd44; }
.btn-chain:hover { background: #1a3a5c; }

/* ── Anchor row ── */
.anchor-row {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.8rem;
}
.anchor-label { color: #8b949e; white-space: nowrap; }
.anchor-url {
  background: #0d1117;
  border: 1px solid #21262d;
  border-radius: 4px;
  padding: 4px 10px;
  color: #79c0ff;
  font-family: monospace;
  font-size: 0.72rem;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.anchor-url.wrong { color: #f85149; border-color: #da363355; background: #2d1212; }

/* ── JWT box ── */
.jwt-box {
  display: none;
  background: #0d1117;
  border: 1px solid #21262d;
  border-radius: 6px;
  padding: 10px 12px;
}
.jwt-box.visible { display: block; }
.jwt-box textarea {
  width: 100%;
  background: transparent;
  border: none;
  color: #79c0ff;
  font-family: monospace;
  font-size: 0.72rem;
  resize: vertical;
  min-height: 56px;
  outline: none;
  line-break: anywhere;
}
.jwt-meta {
  margin-top: 6px;
  font-size: 0.72rem;
  color: #484f58;
  display: flex;
  gap: 14px;
  flex-wrap: wrap;
}

/* ── Divider ── */
.divider { border: none; border-top: 1px solid #21262d; }
</style>
</head>

<div class="page-header">
  <h1>🔐 OpenID Federation — Testscenario's</h1>

</div>

<div class="scenario-grid" id="scenarioGrid"></div>

<script>
let baseUrl = '';

// ── Scenario definitie ────────────────────────────────────────────────────────

const SCENARIOS = [

      { slug: 'rogue',        role: 'bad',   icon: '⚠️' },
      { sub: { issuer: 'intermediate', subject: 'rogue', expectMissing: true } },
      { slug: 'intermediate', role: 'inter', icon: '🔗' },
      { sub: { issuer: 'anchor', subject: 'intermediate' } },

    ]
  },
  {

    title: 'Verlopen subordinate statement',
    valid: false,
    issuer: 'leaf-expired',
    desc: 'De issuer zit in de federatie maar het subordinate statement van Surf is verlopen (exp lag 1 uur in het verleden). Bij chain resolution wordt dit statement opgehaald en direct afgewezen op de exp-claim.',
    topology: [
      { slug: 'leaf-expired', role: 'bad',   icon: '⌛' },
      { sub: { issuer: 'intermediate', subject: 'leaf-expired', expectExpired: true } },
      { slug: 'intermediate', role: 'inter', icon: '🔗' },

    topology: [
      { slug: 'leaf-wrongkey', role: 'bad',   icon: '🔑' },
      { sub: { issuer: 'intermediate', subject: 'leaf-wrongkey', expectJwksMismatch: true } },
      { slug: 'intermediate',  role: 'inter', icon: '🔗' },

    ]
  },

    desc: 'De leaf heeft twee authority_hints: één naar een niet-bestaande intermediate (404), één naar Surf. Een robuuste resolver probeert alle hints en vindt de tweede geldig. De chain slaagt toch via het werkende pad.',
    topology: [
      { slug: 'leaf-multihint', role: 'leaf',  icon: '🏫' },
      { failedHint: 'nonexistent-intermediate', label: 'Niet-bestaande intermediate (404)' },
      { sub: { issuer: 'intermediate', subject: 'leaf-multihint' } },

    ]
  },
  {

    topology: [
      { slug: 'leaf-nohint', role: 'bad',  icon: '🚫' },
      { failedHint: 'nonexistent-1', label: 'Niet-bestaande intermediate 1 (404)' },

    topology: [
      { slug: 'leaf',         role: 'leaf',   icon: '🏫' },

  },
  {
    id: 12,

    desc: 'De intermediate heeft een subordinate statement gepubliceerd voor deze leaf, maar de sub-claim bevat een verkeerde entity-id. Een correcte verifier controleert dat sub in het subordinate statement overeenkomt met de iss van de leaf.',

      { slug: 'leaf-subwrong', role: 'bad',   icon: '🔀' },
      { sub: { issuer: 'intermediate', subject: 'leaf-subwrong', expectSubMismatch: true } },
      { slug: 'intermediate',  role: 'inter', icon: '🔗' },

// ── JWT helpers ───────────────────────────────────────────────────────────────

function decodePayload(jwt) {
  try {
    const part = jwt.split('.')[1];
    const b64 = part.replace(/-/g, '+').replace(/_/g, '/');
    return JSON.parse(atob(b64));
  } catch { return null; }
}

function fmtExp(epoch) {
  if (!epoch) return '?';
  return new Date(epoch * 1000).toLocaleString('nl-NL', {
    day: '2-digit', month: '2-digit', year: 'numeric',
    hour: '2-digit', minute: '2-digit'
  });
}

function isExpired(epoch) {
  return epoch && epoch < Math.floor(Date.now() / 1000);
}

// ── Fetch helpers ─────────────────────────────────────────────────────────────

async function fetchEntityConfig(slug) {
  try {
    const r = await fetch(`/${slug}/.well-known/openid-federation`);
    if (!r.ok) return { ok: false, status: r.status };
    const jwt = await r.text();
    const payload = decodePayload(jwt);
    return { ok: true, jwt, payload };
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

async function fetchSubStatement(issuerSlug, subjectSlug) {
  const subUrl = encodeURIComponent(baseUrl + '/' + subjectSlug);
  try {
    const r = await fetch(`/${issuerSlug}/fetch?sub=${subUrl}`);
    if (!r.ok) return { ok: false, status: r.status };
    const jwt = await r.text();
    const payload = decodePayload(jwt);
    return { ok: true, jwt, payload };
  } catch (e) {
    return { ok: false, error: e.message };
  }
}

// ── Node display names ────────────────────────────────────────────────────────

const SLUG_NAMES = {
  'anchor':        'Nederlandse Overheid',
  'intermediate':  'Surf',
  'intermediate2': 'HBO-raad',
  'leaf':          'Hogeschool Utrecht',
  'leaf2':         'Hogeschool Amsterdam',
  'rogue':         'Onbekende Instelling',
  'leaf-expired':  'Verlopen Instelling',
  'leaf-wrongkey': 'Verkeerde Sleutel Instelling',
  'leaf-multihint':'Hogeschool Veelpad',
  'leaf-nohint':   'Hogeschool Geenpad',
  'leaf-subwrong': 'Verkeerde Sub Instelling'
};
const ROLE_LABELS = { leaf: 'Leaf entity', inter: 'Intermediate', anchor: 'Trust Anchor', bad: 'Leaf entity (probleem)' };

// ── Chain tree rendering ──────────────────────────────────────────────────────

function getKid(jwks) {
  return jwks?.keys?.[0]?.kid ?? null;
}

function renderNodeBox(slug, role, icon, payload, note) {
  const name = (payload && payload.metadata?.federation_entity?.display_name) || SLUG_NAMES[slug] || slug;
  const entityId = payload?.iss || (baseUrl + '/' + slug);

  // authority_hints
  let hintsHtml = '';
  const hints = payload?.authority_hints;
  if (hints && hints.length) {
    const tags = hints.map(h => {
      const short = h.replace(baseUrl, '…');
      return `<span class="tag tag-hint-unkn">↑ ${esc(short)}</span>`;
    }).join('');
    hintsHtml = `
      <div class="detail-group">
        <div class="detail-label">authority_hints</div>
        <div class="detail-values">${tags}</div>
      </div>`;
  }

  // metadata keys
  let metaHtml = '';
  if (payload?.metadata) {
    const m = payload.metadata;
    const parts = [];
    if (m.federation_entity) parts.push(`<span class="tag tag-meta-ok">✓ federation_entity</span>`);
    if (m.openid_credential_issuer) parts.push(`<span class="tag tag-meta-ok">✓ openid_credential_issuer</span>`);
    if (m.vc_issuer) {
      const kid = getKid(m.vc_issuer.jwks);
      parts.push(`<span class="tag tag-jwks">vc_issuer.jwks${kid ? ': ' + kid : ''}</span>`);
    }
    if (parts.length) {
      metaHtml = `
        <div class="detail-group">
          <div class="detail-label">metadata</div>
          <div class="detail-values">${parts.join('')}</div>
        </div>`;
    }
  }

  // jwks (entity-level)
  let jwksHtml = '';
  if (payload?.jwks) {
    const kid = getKid(payload.jwks);
    jwksHtml = `
      <div class="detail-group">
        <div class="detail-label">jwks (eigen sleutel)</div>
        <div class="detail-values"><span class="tag tag-jwks">${kid || '?'}</span></div>
      </div>`;
  }

  const noteHtml = note ? `<div style="font-size:.72rem;color:#e3b341;margin-top:2px;">ℹ ${esc(note)}</div>` : '';

  const hasDetails = hintsHtml || metaHtml || jwksHtml;

  return `
    <div class="tree-node node-${role}">
      <div class="node-top">
        <span class="node-icon">${icon}</span>
        <div class="node-info">
          <div class="node-name">${esc(name)}</div>
          <div class="node-role">${ROLE_LABELS[role] || role}</div>
        </div>
      </div>
      <div class="node-id">${esc(entityId)}</div>
      ${hasDetails ? `<div class="node-details">${hintsHtml}${jwksHtml}${metaHtml}</div>` : ''}
      ${noteHtml}
    </div>`;
}

function renderSubStmt(step, subPayload, entityPayload, issuedBy) {
  const { expectMissing, expectExpired, expectJwksMismatch, expectSubMismatch, subject } = step.sub;
  const issuerName = SLUG_NAMES[step.sub.issuer] || step.sub.issuer;

  if (expectMissing || !subPayload?.ok) {
    return `
      <div class="sub-stmt" style="border-color:#da363355;background:#2d1212">
        <div class="sub-stmt-title">Subordinate statement van ${esc(issuerName)}</div>
        <div class="sub-stmt-row">
          <span class="check-fail">✗ Niet gevonden</span>
          <span style="color:#8b949e;font-size:.72rem">— fetch endpoint gaf ${subPayload?.status || '404'} terug</span>
        </div>
      </div>`;
  }

  const p = subPayload.payload;
  const exp = p?.exp;
  const expired = isExpired(exp);
  const expStr = fmtExp(exp);
  const expOk = !expired;

  const subClaim = p?.sub;
  const expectedSub = baseUrl + '/' + subject;
  const subOk = subClaim === expectedSub;

  // JWKS check: compare vc_issuer.jwks in sub stmt vs entity config
  const subVcKid = getKid(p?.metadata?.vc_issuer?.jwks);
  const entityVcKid = getKid(entityPayload?.payload?.metadata?.vc_issuer?.jwks);
  const entityEcKid = getKid(entityPayload?.payload?.jwks);
  const jwksOk = subVcKid && (subVcKid === entityVcKid || subVcKid === entityEcKid);

  const expIcon  = expOk  ? '<span class="check-ok">✓</span>' : '<span class="check-fail">✗</span>';
  const subIcon  = subOk  ? '<span class="check-ok">✓</span>' : '<span class="check-fail">✗</span>';
  const jwksIcon = !expectJwksMismatch
    ? (jwksOk ? '<span class="check-ok">✓</span>' : '<span class="check-warn">⚠</span>')
    : (jwksOk ? '<span class="check-warn">⚠</span>' : '<span class="check-fail">✗</span>');

  const borderCol = (!expOk || !subOk || (expectJwksMismatch && !jwksOk)) ? '#da363355' : '#23863655';
  const bgCol     = (!expOk || !subOk || (expectJwksMismatch && !jwksOk)) ? '#1a0d0d' : '#0d1a0d';

  let rows = `
    <div class="sub-stmt-row">
      ${expIcon} <span style="color:#8b949e">exp: ${expStr}${expired ? ' — <span class="check-fail">verlopen!</span>' : ''}</span>
    </div>
    <div class="sub-stmt-row">
      ${subIcon} <span style="color:#8b949e">sub: <code style="font-size:.7rem;color:#e6edf3">${esc(subClaim || '?')}</code>${!subOk ? ' <span class="check-fail">↔ verwacht: ' + esc(expectedSub) + '</span>' : ''}</span>
    </div>`;

  if (subVcKid !== undefined) {
    rows += `
      <div class="sub-stmt-row">
        ${jwksIcon} <span style="color:#8b949e">vc_issuer.jwks kid: <code style="font-size:.7rem;color:#79c0ff">${esc(subVcKid || '?')}</code>${expectJwksMismatch && subVcKid !== entityVcKid ? ' <span class="check-fail">↔ entity cfg: ' + esc(entityVcKid || '?') + '</span>' : ''}</span>
      </div>`;
  }

  return `
    <div class="sub-stmt" style="border-color:${borderCol};background:${bgCol}">
      <div class="sub-stmt-title">Subordinate statement van ${esc(issuerName)}</div>
      ${rows}
    </div>`;
}

// ── Load chain for a scenario ─────────────────────────────────────────────────

async function loadChain(scenarioId) {
  const scenario = SCENARIOS.find(s => s.id === scenarioId);
  const container = document.getElementById('chain-' + scenarioId);
  container.innerHTML = `<div class="chain-placeholder"><span class="spinner"></span>Chain ophalen van Render…</div>`;

  // Collect all unique slugs to fetch
  const slugs = new Set();
  const subSteps = [];
  for (const step of scenario.topology) {
    if (step.slug) slugs.add(step.slug);
    if (step.sub) subSteps.push(step.sub);
  }

  // Fetch entity configs
  const entityResults = {};
  await Promise.all([...slugs].map(async slug => {
    entityResults[slug] = await fetchEntityConfig(slug);
  }));

  // Fetch sub statements
  const subResults = {};
  await Promise.all(subSteps.map(async step => {
    const key = step.issuer + '→' + step.subject;
    subResults[key] = await fetchSubStatement(step.issuer, step.subject);
  }));

  // Render
  let html = '<div class="chain-tree">';
  for (const step of scenario.topology) {
    if (step.slug) {
      const res = entityResults[step.slug];
      html += `<div class="tree-node-wrap">`;
      html += renderNodeBox(step.slug, step.role, step.icon, res?.payload, step.note);
      html += `</div>`;
    } else if (step.sub) {
      const key = step.sub.issuer + '→' + step.sub.subject;
      const entityKey = step.sub.subject;
      html += `<div class="tree-connector">
        <div class="connector-line"></div>
        ${renderSubStmt(step, subResults[key], entityResults[entityKey], step.sub.issuer)}
        <div class="connector-line"></div>
      </div>`;
    } else if (step.failedHint) {
      html += `<div class="tree-connector">
        <div class="connector-line"></div>
        <div class="hint-path-failed">✗ authority_hint geprobeerd: <code style="font-size:.7rem">${esc(step.label)}</code> — niet bereikbaar</div>
        <div class="connector-line"></div>
      </div>`;
    }
  }
  html += '</div>';
  container.innerHTML = html;
}

// ── JWT issue ─────────────────────────────────────────────────────────────────

async function fetchJwt(scenarioId) {
  const scenario = SCENARIOS.find(s => s.id === scenarioId);
  const btn  = document.getElementById('jwt-btn-' + scenarioId);
  const copy = document.getElementById('jwt-copy-' + scenarioId);
  const box  = document.getElementById('jwt-box-' + scenarioId);
  const ta   = document.getElementById('jwt-ta-' + scenarioId);
  const meta = document.getElementById('jwt-meta-' + scenarioId);

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>Ophalen…';

  try {
    const r = await fetch('/issue', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ issuer: scenario.issuer, credentialType: 'DiplomaCertificate' })
    });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const d = await r.json();
    ta.value = d.credentialJwt;
    meta.innerHTML = `<span>iss: <b>${esc(d.issuer)}</b></span><span>kid: <b>${esc(d.kid)}</b></span><span>geldig 1 uur</span>`;
    box.classList.add('visible');
    copy.disabled = false;
  } catch (e) {
    ta.value = 'Fout: ' + e.message;
    meta.innerHTML = '';
    box.classList.add('visible');
  } finally {
    btn.disabled = false;
    btn.innerHTML = '🔄 Haal verse JWT op';
  }
}

function copyJwt(scenarioId) {
  const ta = document.getElementById('jwt-ta-' + scenarioId);
  if (!ta?.value) return;
  navigator.clipboard.writeText(ta.value).then(() => {
    const btn = document.getElementById('jwt-copy-' + scenarioId);
    const orig = btn.textContent;
    btn.textContent = '✓ Gekopieerd!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

function copyAnchor(scenarioId) {
  const el = document.getElementById('anchor-url-' + scenarioId);
  if (!el) return;
  navigator.clipboard.writeText(el.textContent).then(() => {
    const btn = document.getElementById('anchor-copy-' + scenarioId);
    const orig = btn.textContent;
    btn.textContent = '✓ Gekopieerd!';
    setTimeout(() => btn.textContent = orig, 1500);
  });
}

// ── Build cards ───────────────────────────────────────────────────────────────

function buildCards() {
  const grid = document.getElementById('scenarioGrid');
  for (const s of SCENARIOS) {
    const badgeClass = s.valid ? 'badge-ok' : 'badge-fail';
    const badgeText  = s.valid ? '✅ Verwacht: geldig' : '❌ Verwacht: ongeldig';

    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `
      <div class="card-header">
        <span class="badge ${badgeClass}">${badgeText}</span>
        <span class="card-title">Scenario ${s.id} — ${esc(s.title)}</span>
      </div>
      <div class="card-body">
        <div class="card-desc">${esc(s.desc)}</div>
        <hr class="divider">
        <div>
          <div class="chain-section-title">Trust chain</div>
          <div style="margin-bottom:8px"></div>
          <div id="chain-${s.id}" class="chain-placeholder">
            Klik "Laad chain" om de live federation endpoints te raadplegen.
          </div>
        </div>
        <div class="btn-row">
          <button class="btn btn-chain" onclick="loadChain(${s.id})">🔍 Laad chain</button>
        </div>
        <hr class="divider">
        <div class="anchor-row">
          <span class="anchor-label">Trust Anchor:</span>
          <span class="anchor-url${s.anchorPath ? ' wrong' : ''}" id="anchor-url-${s.id}">laden…</span>
          <button class="btn btn-ghost" id="anchor-copy-${s.id}" onclick="copyAnchor(${s.id})" style="padding:4px 10px;font-size:.72rem;">📋 Kopieer</button>
        </div>
        ${s.anchorPath ? `<div style="font-size:.75rem;color:#f85149">⚠ Dit is bewust het verkeerde anchor — de chain eindigt hier niet.</div>` : ''}
        <hr class="divider">
        <div class="btn-row">
          <button class="btn btn-primary" id="jwt-btn-${s.id}" onclick="fetchJwt(${s.id})">🔄 Haal verse JWT op</button>
          <button class="btn btn-ghost" id="jwt-copy-${s.id}" onclick="copyJwt(${s.id})" disabled>📋 Kopieer JWT</button>
        </div>
        <div class="jwt-box" id="jwt-box-${s.id}">
          <textarea id="jwt-ta-${s.id}" readonly rows="3"></textarea>
          <div class="jwt-meta" id="jwt-meta-${s.id}"></div>
        </div>
      </div>`;
    grid.appendChild(card);
  }
}

function updateAnchors() {
  for (const s of SCENARIOS) {
    const el = document.getElementById('anchor-url-' + s.id);
    if (el && baseUrl) {
      el.textContent = baseUrl + (s.anchorPath || '/anchor');
    }
  }
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Init ──────────────────────────────────────────────────────────────────────

buildCards();

fetch('/info').then(r => r.json()).then(d => {
  baseUrl = d.endpoints?.anchor_config?.replace('/anchor/.well-known/openid-federation', '') || window.location.origin;
  document.getElementById('baseUrlDisplay').textContent = baseUrl;
  updateAnchors();
}).catch(() => {
  baseUrl = window.location.origin;
  document.getElementById('baseUrlDisplay').textContent = baseUrl;
  updateAnchors();
});
</script>
