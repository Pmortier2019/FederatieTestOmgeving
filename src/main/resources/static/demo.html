<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenID Federation Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: #0d1117;
    color: #e6edf3;
    min-height: 100vh;
    padding: 24px;
  }

  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(135deg, #58a6ff, #79c0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 8px;
  }
  .header .subtitle {
    color: #8b949e;
    font-size: 0.9rem;
  }
  .base-url {
    display: inline-block;
    margin-top: 8px;
    padding: 4px 12px;
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 6px;
    font-family: monospace;
    font-size: 0.8rem;
    color: #79c0ff;
  }

  /* Federation diagram */
  .diagram {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin: 24px auto 32px;
    max-width: 700px;
    flex-wrap: wrap;
    gap: 8px;
  }
  .node {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 14px 20px;
    text-align: center;
    min-width: 140px;
  }
  .node.leaf   { border-color: #388bfd; }
  .node.inter  { border-color: #d29922; }
  .node.anchor { border-color: #3fb950; }
  .node-icon { font-size: 1.5rem; margin-bottom: 4px; }
  .node-title { font-size: 0.75rem; font-weight: 600; color: #8b949e; text-transform: uppercase; letter-spacing: .05em; }
  .node-name  { font-size: 0.9rem; font-weight: 600; margin-top: 2px; }
  .node.leaf   .node-name { color: #79c0ff; }
  .node.inter  .node-name { color: #e3b341; }
  .node.anchor .node-name { color: #56d364; }
  .arrow {
    font-size: 1.4rem;
    color: #484f58;
    padding: 0 4px;
  }

  /* Start button */
  .controls {
    text-align: center;
    margin-bottom: 32px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    font-size: 1rem;
    font-weight: 600;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary {
    background: #238636;
    color: #fff;
  }
  .btn-primary:hover { background: #2ea043; transform: translateY(-1px); }
  .btn-primary:disabled { background: #21262d; color: #484f58; cursor: not-allowed; transform: none; }
  .btn-secondary {
    background: #21262d;
    color: #e6edf3;
    border: 1px solid #30363d;
  }
  .btn-secondary:hover { background: #30363d; }

  /* Scenario container */
  #scenarios { }

  .scenario-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    margin-bottom: 16px;
    overflow: hidden;
    animation: slideIn 0.35s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .scenario-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: #1c2128;
    border-bottom: 1px solid #30363d;
    cursor: pointer;
    user-select: none;
  }
  .scenario-badge {
    background: #388bfd22;
    color: #79c0ff;
    border: 1px solid #388bfd44;
    border-radius: 20px;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 2px 10px;
    white-space: nowrap;
  }
  .scenario-title { font-weight: 600; font-size: 1rem; flex: 1; }
  .scenario-status { font-size: 1.1rem; }
  .scenario-desc { font-size: 0.82rem; color: #8b949e; padding: 8px 18px 10px; border-bottom: 1px solid #21262d; }
  .scenario-body { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }

  /* HTTP call row */
  .http-call {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: #0d1117;
    border: 1px solid #21262d;
    border-radius: 7px;
    padding: 10px 14px;
    font-family: monospace;
    font-size: 0.82rem;
    animation: fadeIn 0.25s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .http-method { color: #79c0ff; font-weight: 700; flex-shrink: 0; }
  .http-url { color: #e6edf3; word-break: break-all; flex: 1; }
  .http-status { flex-shrink: 0; font-weight: 700; border-radius: 4px; padding: 1px 7px; }
  .status-ok   { background: #12261e; color: #56d364; border: 1px solid #238636; }
  .status-err  { background: #2d1212; color: #f85149; border: 1px solid #da3633; }
  .status-warn { background: #271d0c; color: #e3b341; border: 1px solid #9e6a03; }
  .http-details { margin-top: 8px; color: #8b949e; font-size: 0.78rem; display: flex; flex-wrap: wrap; gap: 8px; }
  .claim-tag {
    background: #1c2128;
    border: 1px solid #30363d;
    border-radius: 4px;
    padding: 2px 8px;
  }
  .claim-label { color: #79c0ff; }
  .claim-value { color: #e6edf3; }
  .http-error { color: #f85149; margin-top: 6px; font-size: 0.8rem; word-break: break-all; }

  /* Log row */
  .log-row {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 8px 12px;
    background: #1c2128;
    border-radius: 6px;
    font-size: 0.85rem;
    color: #8b949e;
    animation: fadeIn 0.25s ease;
  }
  .log-icon { color: #388bfd; flex-shrink: 0; }

  /* Result row */
  .result-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 14px 16px;
    border-radius: 8px;
    animation: fadeIn 0.3s ease;
    margin-top: 4px;
  }
  .result-ok   { background: #12261e; border: 1px solid #238636; }
  .result-fail { background: #2d1212; border: 1px solid #da3633; }
  .result-icon { font-size: 1.6rem; flex-shrink: 0; line-height: 1; }
  .result-content {}
  .result-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 4px; }
  .result-ok   .result-title { color: #56d364; }
  .result-fail .result-title { color: #f85149; }
  .result-desc { font-size: 0.83rem; color: #8b949e; }

  /* Scenario test cards */
  .test-grid {
    max-width: 860px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .test-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    overflow: hidden;
  }
  .test-card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: #1c2128;
    border-bottom: 1px solid #30363d;
  }
  .test-badge {
    font-size: 0.72rem;
    font-weight: 700;
    padding: 2px 10px;
    border-radius: 20px;
    white-space: nowrap;
  }
  .badge-valid   { background: #12261e; color: #56d364; border: 1px solid #238636; }
  .badge-invalid { background: #2d1212; color: #f85149; border: 1px solid #da3633; }
  .test-title { font-weight: 600; font-size: 1rem; flex: 1; }
  .test-expected { font-size: 1.1rem; }
  .test-body { padding: 16px 18px; display: flex; flex-direction: column; gap: 12px; }
  .test-desc { font-size: 0.85rem; color: #8b949e; line-height: 1.55; }
  .test-chain {
    display: flex;
    align-items: center;
    gap: 6px;
    flex-wrap: wrap;
    font-size: 0.8rem;
  }
  .chain-node {
    padding: 3px 10px;
    border-radius: 5px;
    font-weight: 600;
  }
  .cn-leaf   { background: #0d2341; color: #79c0ff; border: 1px solid #388bfd55; }
  .cn-inter  { background: #2a1f00; color: #e3b341; border: 1px solid #9e6a0355; }
  .cn-anchor { background: #0d2a14; color: #56d364; border: 1px solid #23863655; }
  .cn-cross  { background: #2d1212; color: #f85149; border: 1px solid #da363355; }
  .chain-arrow { color: #484f58; }
  .test-anchor-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.82rem;
    color: #8b949e;
  }
  .test-anchor-row code {
    background: #0d1117;
    border: 1px solid #21262d;
    border-radius: 4px;
    padding: 2px 8px;
    color: #79c0ff;
    font-size: 0.78rem;
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .test-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .btn-fetch {
    padding: 8px 16px;
    background: #238636;
    color: #fff;
    border: none;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-fetch:hover { background: #2ea043; }
  .btn-fetch:disabled { background: #21262d; color: #484f58; cursor: not-allowed; }
  .btn-copy-small {
    padding: 8px 14px;
    background: #21262d;
    color: #e6edf3;
    border: 1px solid #30363d;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-copy-small:hover { background: #30363d; }
  .btn-copy-small:disabled { color: #484f58; cursor: not-allowed; }
  .jwt-box {
    display: none;
    background: #0d1117;
    border: 1px solid #21262d;
    border-radius: 6px;
    padding: 10px 12px;
  }
  .jwt-box.visible { display: block; }
  .jwt-box textarea {
    width: 100%;
    background: transparent;
    border: none;
    color: #79c0ff;
    font-family: monospace;
    font-size: 0.75rem;
    resize: vertical;
    min-height: 60px;
    outline: none;
    line-break: anywhere;
  }
  .jwt-meta {
    margin-top: 6px;
    font-size: 0.75rem;
    color: #484f58;
    display: flex;
    gap: 12px;
  }
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid #30363d;
    border-top-color: #58a6ff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Tabs */
  .tabs {
    display: flex;
    gap: 4px;
    max-width: 860px;
    margin: 0 auto 20px;
    border-bottom: 1px solid #30363d;
    padding-bottom: 0;
  }
  .tab-btn {
    padding: 8px 20px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: #8b949e;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.15s;
    margin-bottom: -1px;
  }
  .tab-btn:hover { color: #e6edf3; }
  .tab-btn.active { color: #58a6ff; border-bottom-color: #58a6ff; }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* Live panel */
  .live-panel {
    max-width: 860px;
    margin: 0 auto;
  }
  .live-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }
  .live-status {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 0.85rem;
    color: #8b949e;
  }
  .live-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #484f58;
    transition: background 0.3s;
  }
  .live-dot.active { background: #3fb950; animation: pulse 1.5s infinite; }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  #liveLog {
    background: #0d1117;
    border: 1px solid #21262d;
    border-radius: 8px;
    padding: 12px;
    min-height: 200px;
    max-height: 600px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
    font-family: monospace;
    font-size: 0.82rem;
  }
  .live-placeholder {
    color: #484f58;
    text-align: center;
    padding: 40px;
    font-family: 'Segoe UI', sans-serif;
  }

  /* Summary */
  .summary-card {
    background: #161b22;
    border: 1px solid #30363d;
    border-radius: 10px;
    padding: 24px;
    text-align: center;
    margin-bottom: 16px;
    animation: slideIn 0.4s ease;
  }
  .summary-card h2 { font-size: 1.3rem; margin-bottom: 16px; }
  .summary-stats { display: flex; justify-content: center; gap: 32px; margin-bottom: 20px; }
  .stat { text-align: center; }
  .stat-number { font-size: 2.5rem; font-weight: 700; line-height: 1; }
  .stat-ok   .stat-number { color: #56d364; }
  .stat-fail .stat-number { color: #f85149; }
  .stat-label { font-size: 0.85rem; color: #8b949e; margin-top: 4px; }

  /* Authority hints */
  .hints { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .hint-tag {
    background: #1f2937;
    border: 1px solid #374151;
    border-radius: 4px;
    padding: 1px 7px;
    font-size: 0.75rem;
    color: #e3b341;
  }
</style>
</head>
<body>

<div class="header">
  <h1>🔐 OpenID Federation Demo</h1>
  <p class="subtitle">Live visualisatie van trust chain opbouw</p>
  <div class="base-url" id="baseUrlDisplay">laden...</div>
</div>

<div class="diagram">
  <div class="node leaf">
    <div class="node-icon">🏫</div>
    <div class="node-title">Leaf</div>
    <div class="node-name">Hogeschool Utrecht</div>
  </div>
  <div class="arrow">──►</div>
  <div class="node inter">
    <div class="node-icon">🔗</div>
    <div class="node-title">Intermediate</div>
    <div class="node-name">Surf</div>
  </div>
  <div class="arrow">──►</div>
  <div class="node anchor">
    <div class="node-icon">⚓</div>
    <div class="node-title">Trust Anchor</div>
    <div class="node-name">Nederlandse Overheid</div>
  </div>
</div>

<div class="controls">
  <button class="btn btn-primary" id="startBtn" onclick="startDemo()">▶ Start Demo</button>
  <button class="btn btn-secondary" id="restartBtn" onclick="restartDemo()" style="display:none; margin-left:12px;">↺ Opnieuw starten</button>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('demo')">▶ Demo scenario's</button>
  <button class="tab-btn" onclick="switchTab('test')">🧪 Testscenario's</button>
  <button class="tab-btn" onclick="switchTab('live')">📡 Live inkomende calls</button>
</div>

<div id="tab-demo" class="tab-pane active">
  <div id="scenarios" style="max-width:860px;margin:0 auto;"></div>
</div>

<div id="tab-test" class="tab-pane">
  <div class="test-grid" id="testGrid"></div>
</div>

<div id="tab-live" class="tab-pane">
  <div class="live-panel">
    <div class="live-header">
      <div class="live-status">
        <div class="live-dot" id="liveDot"></div>
        <span id="liveStatusText">Verbinden...</span>
      </div>
      <button class="btn btn-secondary" onclick="clearLive()" style="padding:6px 14px;font-size:0.82rem;">Wissen</button>
    </div>
    <div id="liveLog">
      <div class="live-placeholder" id="livePlaceholder">
        Wachten op inkomende federation calls...<br>
        <small>Laat je wallet de leaf aanroepen om hier live te zien wat er binnenkomt.</small>
      </div>
    </div>
  </div>
</div>

<script>
  let es = null;
  let liveEs = null;
  let currentScenario = null;
  let baseUrl = '';

  // ── Testscenario's ──────────────────────────────────────────────────────────

  const TEST_SCENARIOS = [
    {
      id: 1,
      title: "Geldig pad — Hogeschool Utrecht",
      valid: true,
      issuer: "leaf",
      chain: [
        { label: "Hogeschool Utrecht", type: "leaf" },
        { label: "Surf", type: "inter" },
        { label: "Nederlandse Overheid", type: "anchor" }
      ],
      desc: "Volledige en geldige trust chain. De leaf is geregistreerd bij Surf, en Surf is geregistreerd bij de Nederlandse Overheid als trust anchor. Alle sleutels kloppen, alle subordinate statements zijn geldig.",
      credentialType: "DiplomaCertificate"
    },
    {
      id: 2,
      title: "Geldig pad — Hogeschool Amsterdam",
      valid: true,
      issuer: "leaf2",
      chain: [
        { label: "Hogeschool Amsterdam", type: "leaf" },
        { label: "HBO-raad", type: "inter" },
        { label: "Nederlandse Overheid", type: "anchor" }
      ],
      desc: "Een tweede geldig trust pad onder dezelfde trust anchor. Toont dat meerdere intermediates onafhankelijk van elkaar kunnen opereren binnen dezelfde federatie.",
      credentialType: "DiplomaCertificate"
    },
    {
      id: 3,
      title: "Rogue issuer — niet in de federatie",
      valid: false,
      issuer: "rogue",
      chain: [
        { label: "Onbekende Instelling", type: "cross" },
        { label: "Intermediate", type: "inter" },
        { label: "Nederlandse Overheid", type: "anchor" }
      ],
      desc: "De issuer heeft een eigen entity configuration, maar geen enkele intermediate heeft een subordinate statement over hem gepubliceerd. De chain resolution mislukt: intermediate geeft 404 terug op het fetch endpoint.",
      credentialType: "DiplomaCertificate"
    },
    {
      id: 4,
      title: "Verlopen subordinate statement",
      valid: false,
      issuer: "leaf-expired",
      chain: [
        { label: "Verlopen Instelling", type: "cross" },
        { label: "Surf", type: "inter" },
        { label: "Nederlandse Overheid", type: "anchor" }
      ],
      desc: "De issuer is ooit opgenomen in de federatie, maar het subordinate statement van Surf is verlopen (exp ligt 1 uur in het verleden). Bij chain resolution wordt dit statement opgehaald en direct afgewezen door de validator.",
      credentialType: "DiplomaCertificate"
    },
    {
      id: 5,
      title: "Verkeerde sleutel in subordinate statement",
      valid: false,
      issuer: "leaf-wrongkey",
      chain: [
        { label: "Verkeerde Sleutel", type: "cross" },
        { label: "Surf", type: "inter" },
        { label: "Nederlandse Overheid", type: "anchor" }
      ],
      desc: "De trust chain is technisch geldig — intermediate heeft een subordinate statement gepubliceerd. Maar de vc_issuer.jwks in dat statement bevat een andere public key dan waarmee de credential daadwerkelijk is ondertekend. Signatuurverificatie faalt.",
      credentialType: "DiplomaCertificate"
    }
  ];

  function buildTestCards() {
    const grid = document.getElementById('testGrid');
    grid.innerHTML = '';
    TEST_SCENARIOS.forEach(s => {
      const chainHtml = s.chain.map((node, i) => {
        const arrow = i < s.chain.length - 1 ? '<span class="chain-arrow">──►</span>' : '';
        return `<span class="chain-node cn-${node.type}">${esc(node.label)}</span>${arrow}`;
      }).join('');

      const badgeClass = s.valid ? 'badge-valid' : 'badge-invalid';
      const badgeText  = s.valid ? '✅ Verwacht: geldig' : '❌ Verwacht: ongeldig';

      grid.insertAdjacentHTML('beforeend', `
        <div class="test-card">
          <div class="test-card-header">
            <span class="test-badge ${badgeClass}">${badgeText}</span>
            <span class="test-title">${esc(s.title)}</span>
          </div>
          <div class="test-body">
            <div class="test-desc">${esc(s.desc)}</div>
            <div class="test-chain">${chainHtml}</div>
            <div class="test-anchor-row">
              <span>Trust Anchor:</span>
              <code id="anchor-${s.id}">laden...</code>
              <button class="btn-copy-small" onclick="copyAnchor(${s.id})">📋 Kopieer</button>
            </div>
            <div class="test-actions">
              <button class="btn-fetch" id="fetch-btn-${s.id}" onclick="fetchTestJwt(${s.id})">
                🔄 Haal verse JWT op
              </button>
              <button class="btn-copy-small" id="copy-btn-${s.id}" onclick="copyJwt(${s.id})" disabled>
                📋 Kopieer JWT
              </button>
            </div>
            <div class="jwt-box" id="jwt-box-${s.id}">
              <textarea id="jwt-ta-${s.id}" readonly rows="3"></textarea>
              <div class="jwt-meta" id="jwt-meta-${s.id}"></div>
            </div>
          </div>
        </div>
      `);
    });
  }

  function updateAnchors() {
    TEST_SCENARIOS.forEach(s => {
      const el = document.getElementById('anchor-' + s.id);
      if (el) el.textContent = baseUrl ? baseUrl + '/anchor' : 'laden...';
    });
  }

  async function fetchTestJwt(scenarioId) {
    const scenario = TEST_SCENARIOS.find(s => s.id === scenarioId);
    if (!scenario) return;

    const btn = document.getElementById('fetch-btn-' + scenarioId);
    const copyBtn = document.getElementById('copy-btn-' + scenarioId);
    const box = document.getElementById('jwt-box-' + scenarioId);
    const ta  = document.getElementById('jwt-ta-' + scenarioId);
    const meta = document.getElementById('jwt-meta-' + scenarioId);

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Ophalen...';
    box.classList.remove('visible');

    try {
      const resp = await fetch('/issue', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          subject: 'did:example:test',
          credentialType: scenario.credentialType,
          achievement: 'Bachelor of Science',
          issuer: scenario.issuer
        })
      });

      if (!resp.ok) throw new Error('HTTP ' + resp.status);
      const data = await resp.json();

      ta.value = data.credentialJwt;
      meta.innerHTML = `
        <span>iss: <b>${esc(data.issuer)}</b></span>
        <span>kid: <b>${esc(data.kid)}</b></span>
        <span>geldig 1 uur</span>
      `;
      box.classList.add('visible');
      copyBtn.disabled = false;
    } catch (e) {
      ta.value = 'Fout: ' + e.message;
      meta.innerHTML = '';
      box.classList.add('visible');
    } finally {
      btn.disabled = false;
      btn.innerHTML = '🔄 Haal verse JWT op';
    }
  }

  function copyJwt(scenarioId) {
    const ta = document.getElementById('jwt-ta-' + scenarioId);
    if (!ta || !ta.value) return;
    navigator.clipboard.writeText(ta.value).then(() => {
      const btn = document.getElementById('copy-btn-' + scenarioId);
      const orig = btn.textContent;
      btn.textContent = '✓ Gekopieerd!';
      setTimeout(() => btn.textContent = orig, 1500);
    });
  }

  function copyAnchor(scenarioId) {
    const el = document.getElementById('anchor-' + scenarioId);
    if (!el) return;
    navigator.clipboard.writeText(el.textContent).then(() => {
      const btns = el.parentElement.querySelectorAll('button');
      btns.forEach(b => { const o = b.textContent; b.textContent = '✓ Gekopieerd!'; setTimeout(() => b.textContent = o, 1500); });
    });
  }

  // Tab switching
  function switchTab(name) {
    document.querySelectorAll('.tab-btn').forEach((b,i) => {
      b.classList.toggle('active', ['demo','test','live'][i] === name);
    });
    document.getElementById('tab-demo').classList.toggle('active', name === 'demo');
    document.getElementById('tab-test').classList.toggle('active', name === 'test');
    document.getElementById('tab-live').classList.toggle('active', name === 'live');
    if (name === 'live' && !liveEs) startLiveStream();
  }

  // Live stream
  function startLiveStream() {
    liveEs = new EventSource('/demo/live-stream');
    const dot = document.getElementById('liveDot');
    const txt = document.getElementById('liveStatusText');
    dot.classList.add('active');
    txt.textContent = 'Verbonden — wachten op calls';

    ['HTTP_CALL', 'LOG'].forEach(eventName => {
      liveEs.addEventListener(eventName, e => {
        const d = JSON.parse(e.data);
        appendLive(d);
      });
    });

    liveEs.onerror = () => {
      dot.classList.remove('active');
      txt.textContent = 'Verbinding verbroken';
    };
  }

  function appendLive(d) {
    const log = document.getElementById('liveLog');
    const placeholder = document.getElementById('livePlaceholder');
    if (placeholder) placeholder.remove();

    const html = d.type === 'LOG' ? renderLog(d) : renderHttpCall(d);
    const ts = new Date().toLocaleTimeString('nl-NL');
    const wrapper = document.createElement('div');
    wrapper.style.cssText = 'animation:fadeIn .2s ease';
    wrapper.innerHTML = `<div style="color:#484f58;font-size:.72rem;margin-bottom:2px;">${ts}</div>${html}`;
    log.appendChild(wrapper);
    log.scrollTop = log.scrollHeight;
  }

  function clearLive() {
    const log = document.getElementById('liveLog');
    log.innerHTML = '<div class="live-placeholder" id="livePlaceholder">Wachten op inkomende federation calls...<br><small>Laat je wallet de leaf aanroepen om hier live te zien wat er binnenkomt.</small></div>';
  }

  // Fetch base URL from /info
  fetch('/info').then(r => r.json()).then(d => {
    baseUrl = d.endpoints?.anchor_config?.replace('/anchor/.well-known/openid-federation', '') || window.location.origin;
    document.getElementById('baseUrlDisplay').textContent = baseUrl;
    updateAnchors();
  }).catch(() => {
    baseUrl = window.location.origin;
    document.getElementById('baseUrlDisplay').textContent = baseUrl;
    updateAnchors();
  });

  // Bouw testscenario kaarten
  buildTestCards();
  updateAnchors();

  function startDemo() {
    document.getElementById('startBtn').disabled = true;
    document.getElementById('restartBtn').style.display = 'none';
    document.getElementById('scenarios').innerHTML = '';
    currentScenario = null;

    es = new EventSource('/demo/stream');

    es.addEventListener('SCENARIO_START', e => {
      const d = JSON.parse(e.data);
      currentScenario = createScenarioCard(d);
    });

    es.addEventListener('HTTP_CALL', e => {
      const d = JSON.parse(e.data);
      appendToScenario(renderHttpCall(d));
    });

    es.addEventListener('LOG', e => {
      const d = JSON.parse(e.data);
      appendToScenario(renderLog(d));
    });

    es.addEventListener('SCENARIO_RESULT', e => {
      const d = JSON.parse(e.data);
      appendToScenario(renderResult(d));
      finalizeScenario(d.geslaagd);
    });

    es.addEventListener('SUMMARY', e => {
      const d = JSON.parse(e.data);
      renderSummary(d);
      es.close();
      document.getElementById('restartBtn').style.display = 'inline-flex';
    });

    es.addEventListener('DONE', () => {
      es.close();
      document.getElementById('restartBtn').style.display = 'inline-flex';
    });

    es.onerror = () => {
      es.close();
      document.getElementById('startBtn').disabled = false;
    };
  }

  function restartDemo() {
    if (es) es.close();
    document.getElementById('startBtn').disabled = false;
    document.getElementById('restartBtn').style.display = 'none';
    document.getElementById('scenarios').innerHTML = '';
    startDemo();
  }

  function createScenarioCard(d) {
    const card = document.createElement('div');
    card.className = 'scenario-card';
    card.id = 'scenario-' + d.scenarioNummer;
    card.innerHTML = `
      <div class="scenario-header" onclick="toggleScenario(${d.scenarioNummer})">
        <span class="scenario-badge">Scenario ${d.scenarioNummer}</span>
        <span class="scenario-title">${esc(d.scenarioTitel)}</span>
        <span class="scenario-status" id="status-${d.scenarioNummer}">⏳</span>
      </div>
      <div class="scenario-desc">${esc(d.scenarioBeschrijving)}</div>
      <div class="scenario-body" id="body-${d.scenarioNummer}"></div>
    `;
    document.getElementById('scenarios').appendChild(card);
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    return d.scenarioNummer;
  }

  function appendToScenario(html) {
    if (currentScenario === null) return;
    const body = document.getElementById('body-' + currentScenario);
    if (!body) return;
    body.insertAdjacentHTML('beforeend', html);
    body.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function finalizeScenario(geslaagd) {
    if (currentScenario === null) return;
    const status = document.getElementById('status-' + currentScenario);
    if (status) status.textContent = geslaagd ? '✅' : '❌';
  }

  function toggleScenario(nr) {
    const body = document.getElementById('body-' + nr);
    const desc = body?.previousElementSibling;
    if (body) body.style.display = body.style.display === 'none' ? '' : '';
  }

  function renderHttpCall(d) {
    const statusClass = d.statusCode >= 200 && d.statusCode < 300 ? 'status-ok'
                      : d.statusCode === 0 ? 'status-warn' : 'status-err';
    const statusLabel = d.statusCode === 0 ? 'ERR' : d.statusCode;
    const shortUrl = d.url.replace(baseUrl, '');

    let details = '';
    if (d.issField) details += claimTag('iss', shorten(d.issField));
    if (d.subField && d.subField !== d.issField) details += claimTag('sub', shorten(d.subField));
    if (d.expField) details += claimTag('exp', d.expField);
    if (d.authorityHints?.length) {
      details += '<div class="hints">' +
        d.authorityHints.map(h => `<span class="hint-tag">↑ ${shorten(h)}</span>`).join('') +
        '</div>';
    }

    const errorHtml = d.errorMessage
      ? `<div class="http-error">⚠ ${esc(d.errorMessage)}</div>` : '';

    return `<div class="http-call">
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:${details||errorHtml?'8':'0'}px">
          <span class="http-method">GET</span>
          <span class="http-url" title="${esc(d.url)}">${esc(shortUrl || d.url)}</span>
          <span class="http-status ${statusClass}">${statusLabel}</span>
        </div>
        ${details ? `<div class="http-details">${details}</div>` : ''}
        ${errorHtml}
      </div>
    </div>`;
  }

  function renderLog(d) {
    return `<div class="log-row"><span class="log-icon">ℹ</span><span>${esc(d.toelichting)}</span></div>`;
  }

  function renderResult(d) {
    const cls = d.geslaagd ? 'result-ok' : 'result-fail';
    const icon = d.geslaagd ? '✅' : '❌';
    return `<div class="result-row ${cls}">
      <div class="result-icon">${icon}</div>
      <div class="result-content">
        <div class="result-title">${esc(d.resultaat)}</div>
        <div class="result-desc">${esc(d.toelichting)}</div>
      </div>
    </div>`;
  }

  function renderSummary(d) {
    const el = document.createElement('div');
    el.className = 'summary-card';
    el.innerHTML = `
      <h2>Demo afgerond</h2>
      <div class="summary-stats">
        <div class="stat stat-ok">
          <div class="stat-number">${d.aantalGeslaagd}</div>
          <div class="stat-label">Geslaagd</div>
        </div>
        <div class="stat stat-fail">
          <div class="stat-number">${d.aantalMislukt}</div>
          <div class="stat-label">Mislukt (verwacht)</div>
        </div>
      </div>
      <p style="color:#8b949e;font-size:.85rem">Scenario 1 toont de correcte werking. Scenario's 2–4 simuleren foutcases die een verifier correct moet afwijzen.</p>
    `;
    document.getElementById('scenarios').appendChild(el);
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function claimTag(label, value) {
    return `<span class="claim-tag"><span class="claim-label">${label}: </span><span class="claim-value">${esc(value)}</span></span>`;
  }

  function shorten(url) {
    if (!url) return url;
    return url.replace(baseUrl, '…') || url;
  }

  function esc(s) {
    if (!s) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }
</script>
</body>
</html>
